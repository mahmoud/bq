version: '3'
services:
  psql:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_PASSWORD: ""
      POSTGRES_USER: "bq"
      POSTGRES_DB: "bq"
    image: "postgres:${PG_VERSION:-16.3}"
    ports:
    - "5432:5432"
    volumes:
    - psqldata:/var/lib/postgresql/data
    - ./tests/.create-test-db.sql:/docker-entrypoint-initdb.d/create-test-db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "bq"]
      interval: 5s
      timeout: 5s
      retries: 10
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
      args:
        PYTHON_VERSION: "${PYTHON_VERSION:-3.11}"
    environment:
      TEST_DB_URL: "postgresql://bq:@psql/bq_test"
    volumes:
      - .:/app
    depends_on:
      psql:
        condition: service_healthy
    profiles: ["test"]
volumes:
  psqldata:
